name: CD

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    name: Deploy (${{ github.ref_name }})
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    env:
      DATABASE_URL: ${{ github.ref_name == 'main' && secrets.PROD_DATABASE_URL || secrets.STAGING_DATABASE_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: ${{ github.ref_name == 'main' && secrets.PROD_BETTER_AUTH_URL || secrets.STAGING_BETTER_AUTH_URL }}
      FRONTEND_URL: ${{ github.ref_name == 'main' && secrets.PROD_FRONTEND_URL || secrets.STAGING_FRONTEND_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build
        run: npm run build

      - name: Run migrations (production only)
        if: github.ref_name == 'main'
        run: npx prisma migrate deploy

