name: CI

on:
  push:
    branches:
      - 'feature/**'
      - develop
  pull_request:
    branches:
      - develop
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    # Unit tests use fully mocked Prisma (jest.fn()) — no real DB needed.
    # prisma generate requires a non-empty DATABASE_URL in Prisma 5.22+ because
    # the WASM get-config validator reads env() from a .env file, not process.env.
    # A placeholder URL is sufficient: generate never opens a DB connection.

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env for Prisma
        run: |
          echo "DATABASE_URL=postgresql://placeholder:placeholder@localhost:5432/placeholder" > prisma/.env

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run unit tests
        run: npm test
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          BETTER_AUTH_SECRET: ci-secret-not-for-production
          BETTER_AUTH_URL: http://localhost:3001
          FRONTEND_URL: http://localhost:3002
          PORT: 3001

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env for Prisma
        run: |
          echo "DATABASE_URL=postgresql://placeholder:placeholder@localhost:5432/placeholder" > prisma/.env

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build
        run: npm run build
