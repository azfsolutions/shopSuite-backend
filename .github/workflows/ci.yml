name: CI

on:
  push:
    branches:
      - 'feature/**'
      - develop
  pull_request:
    branches:
      - develop
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: shopsuite_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Prisma 5.22+ uses a WASM-based get-config that resolves env() only
      # from values loaded via dotenv (.env file) — NOT from process.env.
      # Without a .env file the WASM context receives an empty map and
      # reports DATABASE_URL as an empty string regardless of env: blocks.
      - name: Create .env for Prisma
        run: |
          echo "DATABASE_URL=postgresql://ci:ci@localhost:5432/shopsuite_test" > .env

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Run unit tests
        run: npm test
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/shopsuite_test
          BETTER_AUTH_SECRET: ci-secret-not-for-production
          BETTER_AUTH_URL: http://localhost:3001
          FRONTEND_URL: http://localhost:3002
          PORT: 3001

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Prisma 5.22+ WASM get-config reads env() from dotenv (.env file),
      # not from process.env. A placeholder URL is enough — no DB connection
      # is made during generation.
      - name: Create .env for Prisma
        run: |
          echo "DATABASE_URL=postgresql://placeholder:placeholder@localhost:5432/placeholder" > .env

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build
        run: npm run build
